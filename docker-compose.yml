services:
  postgres:
    image: postgres:16-alpine
    container_name: execution-workspace-postgres
    environment:
      POSTGRES_DB: workspace
      POSTGRES_USER: workspace
      POSTGRES_PASSWORD: workspace
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workspace -d workspace"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: execution-workspace-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10

  spark:
    image: apache/spark:4.1.2-scala2.13-java17-python3-ubuntu
    container_name: execution-workspace-spark
    command:
      - /bin/bash
      - -lc
      - >
        /opt/spark/sbin/start-master.sh &&
        /opt/spark/sbin/start-connect-server.sh
        --master local[*]
        --conf spark.connect.grpc.binding.address=0.0.0.0
        --conf spark.connect.grpc.binding.port=15002 &&
        tail -F /opt/spark/logs/*
    ports:
      - "${SPARK_MASTER_PORT:-7077}:7077"
      - "${SPARK_UI_PORT:-8081}:8080"
      - "${SPARK_CONNECT_PORT:-15002}:15002"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/7077 && echo > /dev/tcp/127.0.0.1/15002'"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: execution-workspace-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CONFIG_FILE: ${CONFIG_FILE:-/app/config/application.yml}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./config:/app/config:ro
      - ./backend/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: execution-workspace-frontend
    env_file:
      - .env
    environment:
      VITE_API_BASE_URL: http://localhost:${APP_PORT:-8000}
    ports:
      - "${FRONTEND_PORT:-4173}:4173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:4173 >/dev/null 2>&1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  minio_data:
